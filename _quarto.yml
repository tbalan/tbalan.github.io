project:
  type: website
  output-dir: docs
  # Only .qmd files are website pages. This excludes repo docs like
  # EDITING.md and CLAUDE.md, which otherwise break `quarto render`
  # (EDITING.md contains an example ```{r} block Quarto tries to execute).
  render:
    - "*.qmd"
    - "**/*.qmd"
  resources:
    - images/**

format:
  html:
    theme: none
    css: styles.css
    include-in-header: partials/head-theme-init.html
    include-before-body: partials/header.html
    include-after-body: partials/footer.html
